name: Build and Push to ACR

# The Trigger: Runs the pipeline everytime changes are pushed to main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Grab the code from the repository so we can build the Docker image
      - name: Checkout Code
        uses: actions/checkout@v3

      # Use the secure secrets to log into Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build the Docker image and push it to Azure Container Registry
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/nexus-webapp:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nexus-webapp:latest

      # Tell Azure to pull the latest image and restart the site
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-nexus-dev-cus-001-ctw'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ secrets.ACR_LOGIN_SERVER }}/nexus-webapp:latest'